# 63-data-collector-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: data-collector
  template:
    metadata:
      labels:
        app: data-collector
    spec:
      containers:
        - name: data-collector
          image: xxx:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: data-collector
            - secretRef:
                name: data-collector
          volumeMounts:
            - name: data-storage
              mountPath: /app/data
          resources:
            requests:
              cpu: "500m"
              memory: "500Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
      volumes:
        - name: data-storage
          persistentVolumeClaim:
            claimName: data-collector


